<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Locator &amp; Extrema Marker</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="card">
        <h1>Graph Locator &amp; Extrema Marker</h1>

        <section class="section" aria-labelledby="image-section-title">
            <h2 id="image-section-title">Highlight a Graph in an Image</h2>
            <p class="hint">Upload a clear image of a graph</p>
            <div id="dropZone" class="drop-zone" aria-label="Upload a graph image" role="button" tabindex="0">
                <p class="drop-label">Drop an image file here or click to choose one</p>
                <input id="graphImage" type="file" accept="image/*" aria-label="Graph image file input" />
            </div>
            <button id="analyzeImage" disabled>Highlight graph</button>
            <p class="hint">Highlighting splits the canvas into 40 vertical and 40 horizontal guide sections; only the vertical sections are used to place maxima and minima.</p>
            <canvas id="graphCanvas" class="graph-canvas" aria-label="Uploaded graph image"></canvas>
            <button id="markExtrema" disabled>Mark Extremum</button>
            <div id="imageMessage" class="error" role="alert"></div>
            <div id="imageStatus" class="status" aria-live="polite"></div>
        </section>
    </div>

    <script src="script.js"></script>

</body>
</html>
